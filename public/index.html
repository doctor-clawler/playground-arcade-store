<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f2eee4">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; frame-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'">
    <meta name="description" content="#놀이터에서 완성된 브라우저 게임을 모아 바로 플레이하는 독립 아케이드 스토어">
    <title>PLAY//GROUND — 놀이터 아케이드</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./assets/styles.css?v=2026.07.14.3">
  </head>
  <body>
    <a class="skip-link" href="#catalog">게임 목록으로 건너뛰기</a>

    <main>
      <div id="home-view" data-view="home">
        <section id="catalog" class="catalog-section" aria-labelledby="catalog-title">
          <div class="catalog-head">
            <div>
              <p class="section-number">01 — CATALOG</p>
              <h2 id="catalog-title">오늘 뭐 하고 놀까?</h2>
            </div>
          </div>

          <div class="catalog-tools" role="search">
            <label class="search-box">
              <span class="sr-only">게임 검색</span>
              <span aria-hidden="true">⌕</span>
              <input id="search-input" type="search" placeholder="게임, 장르, 태그 검색" autocomplete="off" data-testid="search-input">
            </label>
            <div id="genre-filters" class="genre-filters" aria-label="장르 필터" data-testid="genre-filters"></div>
          </div>

          <div id="game-grid" class="game-grid" aria-live="polite" data-testid="game-grid"></div>
          <div id="empty-state" class="empty-state" hidden>
            <span class="empty-mark" aria-hidden="true">×</span>
            <h3>찾는 게임이 없어요.</h3>
            <p>검색어를 줄이거나 다른 장르를 골라보세요.</p>
            <button id="reset-search" class="text-button" type="button">필터 초기화</button>
          </div>
        </section>
      </div>

      <section id="detail-view" class="detail-view" data-view="detail" hidden aria-labelledby="detail-title" data-testid="detail-view">
        <div class="detail-topbar">
          <button id="back-button" class="back-button" type="button" data-testid="back-button">← 카탈로그</button>
        </div>

        <div class="detail-intro">
          <div class="detail-title-block">
            <h1 id="detail-title"></h1>
            <p id="detail-description" class="detail-description"></p>
          </div>
        </div>

        <div id="player-shell" class="player-shell" data-state="idle" data-testid="player-shell">
          <button id="exit-mobile-player" class="mobile-player-close" type="button" aria-label="게임 전체화면 닫기">×</button>
          <div id="player-poster" class="player-poster">
            <img id="player-poster-image" alt="">
            <div class="player-poster-copy">
              <span id="player-start-hint">게임 시작</span>
              <button id="start-game" class="play-disc" type="button" aria-label="게임 시작" data-testid="start-game">▶</button>
            </div>
          </div>
          <div id="player-loading" class="player-status" hidden role="status">
            <span class="loader" aria-hidden="true"></span>
            <strong>게임을 불러오는 중</strong>
          </div>
          <div id="player-error" class="player-status player-error" hidden role="alert">
            <strong>게임을 열지 못했습니다.</strong>
            <p id="player-error-message">번들 경로나 리소스를 확인해 주세요.</p>
            <button id="retry-game" class="button button-secondary" type="button">다시 시도</button>
          </div>
          <div id="frame-host" class="frame-host" hidden></div>
        </div>

        <div class="player-toolbar">
          <p id="player-label">포스터에서 플레이 버튼을 누르세요.</p>
          <div>
            <button id="reload-game" class="tool-button" type="button" disabled>↻ 다시 시작</button>
            <button id="fullscreen-game" class="tool-button" type="button" disabled data-testid="fullscreen-game">⛶ 전체화면</button>
          </div>
        </div>

        <div class="detail-lower">
          <section aria-labelledby="controls-title">
            <p class="section-number">TOUCH CONTROLS</p>
            <h2 id="controls-title">모바일 조작</h2>
            <ul id="controls-list" class="controls-list"></ul>
          </section>
        </div>
      </section>

      <section id="not-found-view" class="not-found" hidden data-view="not-found">
        <span>404</span>
        <h1>이 게임은 진열대에 없어요.</h1>
        <p>주소가 바뀌었거나 현재 제공하지 않는 게임입니다.</p>
        <a class="button button-primary" href="#home">카탈로그로 돌아가기</a>
      </section>
    </main>

    <script src="./catalog.js?v=2026.07.14.3"></script>
    <script src="./assets/app.js?v=2026.07.14.3"></script>
  </body>
</html>
