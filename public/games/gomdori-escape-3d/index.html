<!doctype html>
<html lang="ko">
  <head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src http: https:; style-src http: https: 'unsafe-inline'; img-src http: https: data:; font-src http: https:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>곰돌이</title>
    <script defer src="./game.bundle.js"></script>
    <style>
:root{--lightningcss-light: ;--lightningcss-dark:initial;color-scheme:dark;--bg:#121019;--ink:#f4eefc;--muted:#b9adc7;--accent:#f4b84f}*{box-sizing:border-box}html,body{overscroll-behavior:none;touch-action:none;height:100%;margin:0;overflow:hidden}body{min-height:100%;color:var(--ink);background:radial-gradient(circle at 18% 18%,#f4b84f21,#0000 24rem),linear-gradient(135deg,#121019 0%,#251b32 52%,#14111c 100%);place-items:center;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;display:grid}html,body,canvas,.touch-controls,.touch-controls *{-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}.game-shell{touch-action:none;width:min(100vw,1120px);padding:clamp(10px,2vw,22px);position:relative}canvas{aspect-ratio:16/10;touch-action:none;background:#17111f;border:1px solid #ffffff2e;width:100%;max-height:calc(100svh - 154px);margin:0 auto;display:block;box-shadow:0 22px 80px #00000061}.touch-controls{z-index:19;-webkit-user-select:none;user-select:none;touch-action:none;justify-content:center;align-items:center;gap:28px;width:min(460px,100%);margin:12px auto 0;display:flex;position:relative}.dpad{grid-template-rows:repeat(2,48px);grid-template-columns:repeat(3,48px);gap:6px;display:grid}.dpad span{display:block}.touch-controls button{appearance:none;min-width:48px;height:48px;color:var(--ink);touch-action:none;background:#ffffff1c;border:1px solid #ffffff4d;border-radius:8px;place-items:center;font:800 19px/1 system-ui,sans-serif;display:grid}.arrow{filter:drop-shadow(0 1px #00000040);width:0;height:0;display:block}.arrow-up{border-bottom:16px solid;border-left:10px solid #0000;border-right:10px solid #0000}.arrow-down{border-top:16px solid;border-left:10px solid #0000;border-right:10px solid #0000}.arrow-left{border-top:10px solid #0000;border-bottom:10px solid #0000;border-right:16px solid}.arrow-right{border-top:10px solid #0000;border-bottom:10px solid #0000;border-left:16px solid}.touch-controls button:active,.touch-controls button.is-active{color:#241208;background:var(--accent);border-color:#ffe0a1}.action-btn{width:86px;height:64px;background:var(--accent)!important;color:#241208!important;border-color:#ffe0a1!important}.inspect-icon{width:34px;height:34px;display:block;position:relative}.inspect-icon:before{content:"";border:5px solid;border-radius:50%;width:19px;height:19px;position:absolute;top:2px;left:3px}.inspect-icon:after{content:"";transform-origin:50%;background:currentColor;border-radius:6px;width:17px;height:6px;position:absolute;bottom:4px;right:2px;transform:rotate(45deg)}.outside-note{color:var(--muted);text-align:center;letter-spacing:0;margin-top:10px;font-size:13px}@media (width<=760px){.game-shell{padding:8px}.outside-note{font-size:12px}.touch-controls{gap:18px}.dpad{grid-template-rows:repeat(2,44px);grid-template-columns:repeat(3,44px)}.touch-controls button{min-width:44px;height:44px}.action-btn{width:78px;height:58px}}

</style>
  </head>
  <body>
    <main class="game-shell" aria-label="곰돌이 게임">
      <canvas id="game" width="960" height="600" aria-label="곰돌이 플레이 화면"></canvas>
      <div class="touch-controls" aria-label="터치 조작">
        <div class="dpad" aria-label="이동">
          <span></span>
          <button type="button" data-hold="ArrowUp" aria-label="위로 이동"><span class="arrow arrow-up" aria-hidden="true"></span></button>
          <span></span>
          <button type="button" data-hold="ArrowLeft" aria-label="왼쪽 이동"><span class="arrow arrow-left" aria-hidden="true"></span></button>
          <button type="button" data-hold="ArrowDown" aria-label="아래로 이동"><span class="arrow arrow-down" aria-hidden="true"></span></button>
          <button type="button" data-hold="ArrowRight" aria-label="오른쪽 이동"><span class="arrow arrow-right" aria-hidden="true"></span></button>
        </div>
        <button class="action-btn" type="button" data-action="interact" aria-label="조사"><span class="inspect-icon" aria-hidden="true"></span></button>
      </div>
      <div class="outside-note">WASD/방향키 또는 화면 버튼 이동 · E/조사 버튼</div>
    </main>
  
<script src="./store-bridge.js"></script>
</body>
</html>
