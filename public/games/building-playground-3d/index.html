<!doctype html>
<html lang="ko">
  <head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src http: https:; style-src http: https: 'unsafe-inline'; img-src http: https: data:; font-src http: https:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 건축 놀이터</title>
    <script defer src="./game.bundle.js"></script>
    <style>
700;900&display=swap";:root{--lightningcss-light:initial;--lightningcss-dark: ;color-scheme:light;color:#241c15;--panel:#fffcf4e6;--panel-strong:#fff9ee;--ink:#241c15;--muted:#735f4c;--accent:#f35b2f;--accent-deep:#c93718;--line:#30231829;--shadow:0 18px 48px #3f2d162e;background:#f7eddc;font-family:Noto Sans KR,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}*{box-sizing:border-box}html,body,#app{width:100%;height:100%;margin:0;overflow:hidden}button{font:inherit}#game-canvas{touch-action:none;width:100%;height:100%;display:block}.topbar{z-index:10;border:1px solid var(--line);background:var(--panel);min-height:64px;box-shadow:var(--shadow);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-radius:8px;justify-content:space-between;align-items:center;gap:12px;padding:10px 12px;display:flex;position:fixed;inset:14px 14px auto}.brand{align-items:center;gap:10px;min-width:0;display:flex}.brand-mark{color:#ffe8bd;background:#293f56;border-radius:8px;flex:none;place-items:center;width:42px;height:42px;font-size:24px;display:grid;box-shadow:inset 0 -3px #0000002e}.brand strong{letter-spacing:0;font-family:Jua,Noto Sans KR,sans-serif;font-size:clamp(18px,3vw,30px);line-height:1;display:block}.brand span:last-child{max-width:min(52vw,620px);color:var(--muted);text-overflow:ellipsis;white-space:nowrap;margin-top:4px;font-size:13px;display:block;overflow:hidden}.top-actions{flex:none;align-items:center;gap:8px;display:flex}.primary-button,.secondary-button,.icon-button,.build-toggle,.delete-toggle,.category-tab,.item-button{cursor:pointer;border:0;border-radius:8px;transition:transform .16s,box-shadow .16s,background .16s,color .16s}.primary-button{background:var(--accent);color:#fffaf0;min-height:44px;box-shadow:0 8px 0 var(--accent-deep);padding:0 18px;font-weight:900}.primary-button:hover,.build-toggle:hover,.delete-toggle:hover,.item-button:hover,.category-tab:hover,.icon-button:hover,.secondary-button:hover{transform:translateY(-1px)}.primary-button:active,.build-toggle:active,.delete-toggle:active{box-shadow:0 4px 0 var(--accent-deep);transform:translateY(4px)}.secondary-button{border:1px solid var(--line);min-height:44px;color:var(--ink);background:#fff;padding:0 18px;font-weight:900}.icon-button{color:#fff7e7;background:#293f56;place-items:center;width:44px;height:44px;font-size:24px;font-weight:900;display:grid;box-shadow:inset 0 -3px #0000002e}.help-panel{z-index:8;border:1px solid var(--line);color:var(--muted);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);background:#fffcf4c2;border-radius:8px;grid-template-columns:auto auto;gap:3px 10px;padding:12px;font-size:12px;display:grid;position:fixed;top:92px;left:14px;box-shadow:0 10px 30px #3f2d161f}.help-panel strong{color:var(--ink)}.bottom-actions{z-index:12;justify-content:center;align-items:flex-end;gap:10px;width:min(430px,100vw - 32px);display:flex;position:fixed;bottom:18px;left:50%;transform:translate(-50%)}.build-toggle,.delete-toggle{letter-spacing:0;min-height:62px;font-family:Jua,Noto Sans KR,sans-serif;font-size:30px}.build-toggle{background:var(--accent);color:#fffaf0;min-width:0;box-shadow:0 10px 0 var(--accent-deep), 0 18px 40px #703c233d;flex:auto;padding:0 34px}.delete-toggle{color:#fff7e7;background:#293f56;flex:0 0 118px;padding:0 18px;box-shadow:0 10px #172838,0 18px 40px #2832402e}.delete-toggle.is-active{color:#fffaf0;background:#d33f2f;box-shadow:0 10px #9e2b20,0 18px 40px #7c2d2338}.build-panel{z-index:11;border:1px solid var(--line);background:var(--panel);max-height:min(45vh,380px);box-shadow:var(--shadow);-webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);border-radius:8px;grid-template-columns:minmax(132px,180px) 1fr;gap:12px;padding:12px;display:grid;position:fixed;bottom:94px;left:14px;right:14px}.build-panel[hidden],.saved-screen[hidden]{display:none}.category-tabs{align-content:start;gap:6px;padding-right:2px;display:grid;overflow-y:auto}.category-tab{color:#493729;text-align:left;background:#ffffffa3;justify-content:flex-start;align-items:center;min-height:42px;padding:0 12px;font-weight:900;display:flex}.category-tab.is-active{color:#fff7e7;background:#293f56;box-shadow:inset 0 -3px #00000029}.item-grid{grid-template-columns:repeat(auto-fill,minmax(116px,1fr));align-content:start;gap:8px;padding-right:4px;display:grid;overflow-y:auto}.item-button{border:1px solid var(--line);min-height:54px;color:var(--ink);text-align:left;background:#ffffffbd;grid-template-columns:32px 1fr;align-items:center;padding:8px;display:grid}.item-button.is-selected{background:#fff4de;border-color:#f35b2f8c;box-shadow:inset 0 0 0 2px #f35b2f40}.item-swatch{border:2px solid #241c1533;border-radius:7px;width:26px;height:26px;box-shadow:inset 0 -4px #00000021}.item-label{overflow-wrap:anywhere;min-width:0;font-size:13px;font-weight:900;line-height:1.2}.saved-screen{z-index:30;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);background:#1c140f6b;place-items:center;padding:18px;display:grid;position:fixed;inset:0}.saved-box{width:min(520px,100%);color:var(--ink);background:#fff9ee;border-radius:8px;padding:28px;box-shadow:0 30px 80px #16110c52}.saved-kicker{color:var(--accent-deep);margin:0 0 6px;font-size:13px;font-weight:900}.saved-box h1{letter-spacing:0;margin:0;font-family:Jua,Noto Sans KR,sans-serif;font-size:clamp(28px,8vw,52px);line-height:1}.saved-box p{color:var(--muted)}.saved-actions{flex-wrap:wrap;gap:10px;margin-top:20px;display:flex}@media (width<=720px){.topbar{flex-direction:column;align-items:stretch}.top-actions{width:100%}.top-actions .primary-button{flex:auto}.brand span:last-child{max-width:calc(100vw - 96px)}.help-panel{display:none}.build-panel{grid-template-columns:1fr;max-height:52vh}.category-tabs{padding-bottom:3px;display:flex;overflow:auto hidden}.category-tab{flex:none}.item-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}}

</style>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas" aria-label="3D 건축 게임 화면"></canvas>

      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">▦</span>
          <div>
            <strong>3D 건축 놀이터</strong>
            <span id="status-text">블록을 골라 바닥에 놓아보세요</span>
          </div>
        </div>
        <div class="top-actions">
          <button id="rotate-button" class="icon-button" type="button" title="선택한 물체 돌리기" aria-label="선택한 물체 돌리기">↻</button>
          <button id="save-exit-button" class="primary-button" type="button">저장하고 나가기</button>
        </div>
      </header>

      <aside class="help-panel" aria-label="조작 안내">
        <strong>놓기</strong>
        <span>바닥 클릭</span>
        <strong>보기</strong>
        <span>드래그 / 휠</span>
        <strong>회전</strong>
        <span>R 또는 ↻</span>
      </aside>

      <section id="build-panel" class="build-panel" aria-label="만들기 목록" hidden>
        <nav id="category-tabs" class="category-tabs" aria-label="건축물 분류"></nav>
        <div id="item-grid" class="item-grid" aria-label="건축물 선택"></div>
      </section>

      <div class="bottom-actions" aria-label="건축 조작">
        <button id="delete-toggle" class="delete-toggle" type="button" aria-pressed="false">삭제</button>
        <button id="build-toggle" class="build-toggle" type="button">만들기</button>
      </div>

      <div id="saved-screen" class="saved-screen" role="dialog" aria-modal="true" aria-labelledby="saved-title" hidden>
        <div class="saved-box">
          <p class="saved-kicker">저장 완료</p>
          <h1 id="saved-title">건축물이 저장됐어요</h1>
          <p id="saved-summary">다음에 다시 열면 그대로 이어서 만들 수 있어요.</p>
          <div class="saved-actions">
            <button id="continue-button" class="primary-button" type="button">계속 만들기</button>
            <button id="new-world-button" class="secondary-button" type="button">새로 시작</button>
          </div>
        </div>
      </div>
    </div>
  
<script src="./store-bridge.js"></script>
</body>
</html>
