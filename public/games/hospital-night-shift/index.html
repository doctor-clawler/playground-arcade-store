<!doctype html>
<html lang="ko">
  <head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src http: https:; style-src http: https: 'unsafe-inline'; img-src http: https: data:; font-src http: https:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospital Ward 3D</title>
    <script defer src="./game.bundle.js"></script>
    <style>
:root{--ink:#eef8f7;--muted:#9eb9b5;--panel:#071214c7;--panel-strong:#08181aeb;--line:#baece538;--accent:#50e3c2;--danger:#ff6b6b;--warn:#ffd166;--shadow:0 18px 54px #00000057;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}*{box-sizing:border-box}html,body,#game-root{width:100%;height:100%;margin:0;overflow:hidden}body{color:var(--ink);background:#071214}#game-root{isolation:isolate;position:relative}canvas{cursor:crosshair;width:100%;height:100%;display:block}#crosshair{pointer-events:none;z-index:3;border:1px solid #eef8f7b8;border-radius:999px;width:18px;height:18px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}#crosshair:after{content:"";background:#eef8f7db;border-radius:999px;width:3px;height:3px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}#hud{z-index:4;pointer-events:none;align-items:center;gap:10px;display:flex;position:absolute;top:clamp(12px,2vw,24px);left:clamp(12px,2vw,24px)}.health-wrap,#status-chip,#rooms-strip,#dialogue,#start-panel{border:1px solid var(--line);background:var(--panel);box-shadow:var(--shadow);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}.health-wrap{border-radius:8px;grid-template-columns:auto minmax(88px,14vw) 36px;align-items:center;gap:8px;min-height:38px;padding:8px 10px;font-size:13px;font-weight:700;display:grid}.health-meter{background:#eef8f72e;border-radius:999px;height:9px;position:relative;overflow:hidden}#health-fill{border-radius:inherit;background:linear-gradient(90deg, var(--accent), #b7f8dd);width:100%;height:100%;transition:width .16s,background .16s}#status-chip{max-width:min(48vw,420px);min-height:38px;color:var(--ink);white-space:nowrap;text-overflow:ellipsis;border-radius:8px;padding:9px 12px;font-size:13px;font-weight:700;overflow:hidden}#rooms-strip{z-index:4;pointer-events:none;border-radius:8px;gap:8px;padding:8px;display:flex;position:absolute;top:clamp(12px,2vw,24px);right:clamp(12px,2vw,24px)}#rooms-strip span{min-width:76px;color:var(--muted);text-align:center;background:#eef8f71a;border-radius:6px;padding:5px 8px;font-size:12px;font-weight:800}#rooms-strip span.busy{color:#04100d;background:var(--accent)}#move-pad{z-index:5;touch-action:none;-webkit-user-select:none;user-select:none;grid-template-rows:repeat(3,40px);grid-template-columns:repeat(3,40px);gap:6px;display:grid;position:absolute;bottom:clamp(12px,3vh,28px);left:clamp(12px,2vw,24px)}#move-pad button{width:40px;height:40px;color:var(--ink);box-shadow:var(--shadow);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);cursor:pointer;background:#071214c2;border:1px solid #eef8f742;border-radius:8px;font-size:18px;font-weight:900;line-height:1}#move-pad button:active,#move-pad button.active{background:var(--accent);color:#04100d;transform:translateY(1px)}#move-forward{grid-area:1/2}#move-left{grid-area:2/1}#move-back{grid-area:3/2}#move-right{grid-area:2/3}#talisman-button{z-index:5;aspect-ratio:1.6;color:#3b2100;cursor:pointer;background:linear-gradient(#ffe59b,#f6b13d);border:1px solid #ffd166a8;border-radius:8px;width:clamp(76px,18vw,112px);font-size:clamp(16px,2.6vw,22px);font-weight:900;transition:transform .12s,filter .12s;position:absolute;bottom:clamp(14px,4vh,34px);left:50%;transform:translate(-50%);box-shadow:0 16px 30px #ffb13d42}#talisman-button:hover,#talisman-button.active{filter:brightness(1.08);transform:translate(-50%)translateY(-2px)}#talisman-button.active{border-color:#ffffffeb}#dialogue{z-index:7;border-radius:8px;width:min(460px,100vw - 28px);padding:16px;position:absolute;bottom:clamp(90px,16vh,142px);left:50%;transform:translate(-50%)}#guest-line{min-height:44px;color:var(--ink);text-align:center;font-size:clamp(18px,4vw,26px);font-weight:900;line-height:1.28}.dialogue-actions{grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;display:grid}.dialogue-actions button,#start-button{color:#05201c;cursor:pointer;background:#e8fffa;border:1px solid #eef8f73d;border-radius:8px;min-height:46px;font-size:16px;font-weight:900}#reject-button{color:var(--ink);background:#142729}#start-panel{z-index:10;text-align:center;background:radial-gradient(circle at 52% 48%,#50e3c229,#0000 34%),#040c0edb;border:0;border-radius:0;place-content:center;gap:18px;display:grid;position:absolute;inset:0}#start-panel h1{letter-spacing:0;text-shadow:0 14px 46px #0000007a;margin:0;font-size:clamp(40px,9vw,92px);line-height:.95}#start-button{background:var(--accent);justify-self:center;min-width:140px}.hidden{display:none!important}@media (width<=720px){#hud{flex-direction:column;align-items:stretch;right:12px}#rooms-strip{max-width:calc(100vw - 24px);inset:110px 12px auto auto;overflow:hidden}#rooms-strip span{min-width:58px;font-size:11px}#move-pad{grid-template-rows:repeat(3,38px);grid-template-columns:repeat(3,38px);gap:5px}#move-pad button{width:38px;height:38px}}

</style>
  </head>
  <body>
    <main id="game-root" aria-label="Hospital Ward 3D game">
      <div id="crosshair" aria-hidden="true"></div>

      <section id="hud" aria-live="polite">
        <div class="health-wrap">
          <span>체력</span>
          <div class="health-meter" aria-hidden="true">
            <div id="health-fill"></div>
          </div>
          <strong id="health-value">100</strong>
        </div>
        <div id="status-chip">접수 대기</div>
      </section>

      <section id="rooms-strip" aria-label="진료실 상태">
        <span id="room-1">1 비어있음</span>
        <span id="room-2">2 비어있음</span>
        <span id="room-3">3 비어있음</span>
      </section>

      <section id="move-pad" aria-label="이동">
        <button id="move-forward" type="button" data-move="forward" aria-label="앞으로 이동">▲</button>
        <button id="move-left" type="button" data-move="left" aria-label="왼쪽 이동">◀</button>
        <button id="move-back" type="button" data-move="back" aria-label="뒤로 이동">▼</button>
        <button id="move-right" type="button" data-move="right" aria-label="오른쪽 이동">▶</button>
      </section>

      <button id="talisman-button" type="button" aria-label="부적 들기">부적</button>

      <section id="dialogue" class="hidden" aria-modal="true" role="dialog">
        <div id="guest-line">...</div>
        <div class="dialogue-actions">
          <button id="admit-button" type="button">들어가</button>
          <button id="reject-button" type="button">잘가!</button>
        </div>
      </section>

      <section id="start-panel">
        <h1>병원 야간 접수</h1>
        <button id="start-button" type="button">시작</button>
      </section>
    </main>

  
<script src="./store-bridge.js"></script>
</body>
</html>
