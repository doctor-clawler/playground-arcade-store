<!doctype html>
<html lang="ko">
  <head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src http: https:; style-src http: https: 'unsafe-inline'; img-src http: https: data:; font-src http: https:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>워드 스파이</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="table-backdrop" aria-hidden="true"></div>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">인원 설정 단어 추리</p>
          <h1>워드 스파이</h1>
        </div>
        <button class="ghost-button" id="newRoundTop" type="button" aria-label="새 라운드 시작">
          <span aria-hidden="true">↻</span>
          새 라운드
        </button>
      </header>

      <section class="play-layout" aria-label="게임 진행">
        <section class="stage" aria-live="polite">
          <div class="round-strip">
            <span id="roundStatus">대기 중</span>
            <span id="progressLabel">0 / 3 확인</span>
          </div>

          <button class="word-card" id="wordCard" type="button" aria-label="현재 플레이어 단어 카드">
            <span class="card-kicker" id="cardKicker">준비</span>
            <span class="card-word" id="cardWord">시작</span>
            <span class="card-note" id="cardNote">새 라운드를 눌러 시작하세요</span>
          </button>

          <div class="action-row">
            <button class="primary-button" id="primaryAction" type="button">새 라운드 시작</button>
            <button class="secondary-button" id="answerAction" type="button" hidden>정답 보기</button>
          </div>
        </section>

        <aside class="side-panel" aria-label="라운드 상태">
          <div class="setup-panel" id="setupPanel">
            <span class="small-label">플레이어 수</span>
            <div class="count-stepper" aria-label="플레이어 수 설정">
              <button class="stepper-button" id="decreasePlayers" type="button" aria-label="플레이어 수 줄이기">−</button>
              <output class="player-count-value" id="playerCountValue">3</output>
              <button class="stepper-button" id="increasePlayers" type="button" aria-label="플레이어 수 늘리기">+</button>
            </div>
            <p class="setup-hint" id="setupHint">3~10명 설정</p>
          </div>

          <div class="player-list" id="playerList"></div>

          <div class="clue-block">
            <span class="small-label">라운드 단서</span>
            <strong id="clueText">모두 확인하면 표시됩니다</strong>
          </div>

          <div class="answer-block" id="answerBlock" hidden>
            <span class="small-label">정답</span>
            <p id="answerText"></p>
          </div>
        </aside>
      </section>
    </main>

    <script defer src="./game.bundle.js"></script>
  
<script src="./store-bridge.js"></script>
</body>
</html>
