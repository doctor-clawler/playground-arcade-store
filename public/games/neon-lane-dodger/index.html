<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src http: https:; style-src http: https: 'unsafe-inline'; img-src http: https: data:; font-src http: https:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#05060f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Neon Lane Dodger</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="hud" aria-live="polite">
        <div class="stat">
          <span class="label">Score</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="stat right">
          <span class="label">Best</span>
          <span class="value" id="high-score">0</span>
        </div>
      </header>

      <canvas id="game" width="360" height="640" aria-label="Neon Lane Dodger playfield"></canvas>

      <div class="touch-zones" id="touch-zones" aria-hidden="true">
        <button type="button" class="zone" data-lane="0" aria-label="Left lane"></button>
        <button type="button" class="zone" data-lane="1" aria-label="Center lane"></button>
        <button type="button" class="zone" data-lane="2" aria-label="Right lane"></button>
      </div>

      <p class="footer-tip" id="footer-tip">3레인 네온 회피</p>

      <div class="overlay" id="overlay-menu">
        <div class="panel">
          <span class="badge">Hypercasual</span>
          <h1>Neon Lane Dodger</h1>
          <p class="subtitle">3개 레인 사이를 이동하며<br />떨어지는 네온 장애물을 피하세요.</p>
          <div class="controls-hint">
            · 모바일: 레인 탭 / 좌우 스와이프<br />
            · 데스크톱: 클릭 또는 ← → / A D<br />
            · 스페이스·엔터로 시작·재시작
          </div>
          <button type="button" class="btn" id="btn-start">START</button>
        </div>
      </div>

      <div class="overlay hidden" id="overlay-gameover">
        <div class="panel">
          <p class="gameover-title">GAME OVER</p>
          <p class="final-score" id="final-score">0</p>
          <p class="final-high">최고 점수 <strong id="final-high">0</strong></p>
          <button type="button" class="btn" id="btn-restart">RESTART</button>
          <button type="button" class="btn secondary" id="btn-menu">MENU</button>
        </div>
      </div>
    </div>

    <script defer src="./game.bundle.js"></script>
    
  
<script src="./store-bridge.js"></script>
</body>
</html>
