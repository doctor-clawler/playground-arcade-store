<!doctype html>
<html lang="ko">
  <head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src http: https:; style-src http: https: 'unsafe-inline'; img-src http: https: data:; font-src http: https:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#fbf6ec">
    <title>스파게티 머지 레스토랑</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell" aria-label="스파게티 머지 레스토랑">
      <header class="topbar">
        <div>
          <p class="eyebrow">MERGE RESTAURANT</p>
          <h1>스파게티 머지</h1>
        </div>
        <output id="money" class="money" aria-label="보유 금액">₩0</output>
      </header>

      <section class="customer-lane" aria-label="손님 주문" id="customers"></section>

      <section class="workbench" aria-label="재료 작업대">
        <div class="tool-row">
          <button id="basket" class="basket" type="button" aria-label="장바구니에서 재료 꺼내기">
            <span class="basket-icon" aria-hidden="true">🛒</span>
            <span>장바구니</span>
          </button>
          <output id="selected" class="selected-readout" aria-label="선택한 재료">선택 없음</output>
        </div>

        <div id="board" class="board" aria-label="7 곱하기 7 재료 판"></div>
        <div id="message" class="message" role="status" aria-live="polite"></div>
      </section>

      <section class="recipe-strip" aria-label="레시피 순서" id="recipe"></section>
    </main>
    <script src="./game.bundle.js"></script>
  
<script src="./store-bridge.js"></script>
</body>
</html>
